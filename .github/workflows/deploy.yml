name: deploy Storybook

on:
  push:
    branches:
      - test/static
  pull_request:
    branches:
      - test/static
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: npm install
        run: npm install
      - name: create
        run: |
          mkdir -p static
          echo '<!DOCTYPE html><html lang="kr"><title>안녕하세요</title>' > static/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: static
      - uses: actions/deploy-pages@v4
        id: deploy-pages
